<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#1a73e8" />
  <!-- Globe meridians -->
  <ellipse cx="50" cy="50" rx="22" ry="48" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="38" ry="48" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Globe equator and parallels -->
  <line x1="2" y1="50" x2="98" y2="50" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="48" ry="16" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <!-- Clock face (inner white circle) -->
  <circle cx="50" cy="50" r="26" fill="white" opacity="0.92"/>
  <!-- Clock hour marks -->
  <line x1="50" y1="27" x2="50" y2="31" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="69" x2="50" y2="73" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <line x1="27" y1="50" x2="31" y2="50" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <line x1="69" y1="50" x2="73" y2="50" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <!-- Clock hands -->
  <line x1="50" y1="50" x2="50" y2="34" stroke="#1a73e8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="62" y2="55" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="50" cy="50" r="2.5" fill="#1a73e8"/>
</svg>
