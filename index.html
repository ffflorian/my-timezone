<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Timezone</title>
    <meta
      name="description"
      content="Find your true solar time &ndash; the astronomically correct local mean time at your exact geographic location."
    />
    <meta property="og:title" content="My Timezone" />
    <meta
      property="og:description"
      content="Find your true solar time &ndash; the astronomically correct local mean time at your exact geographic location."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ffflorian.github.io/my-timezone/" />
    <meta property="og:image" content="https://ffflorian.github.io/my-timezone/img/icon-512x512.png" />
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/apple-touch-icon.png" />
    <script>
      (function () {
        var stored = localStorage.getItem('theme');
        var theme =
          stored === 'light' || stored === 'dark'
            ? stored
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
