name: Check for yarn updates


on:
  schedule:
    - cron: '0 5 1 * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/yarn_update.yml'
  workflow_dispatch:

jobs:
  yarn-update-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Update yarn
        uses: ffflorian/actions/yarn-update@dcf7867b80c82038098ed48c2eaf9944e84a98bb
        with:
          git_authorship: 'Florian Imdahl <git@ffflorian.de>'
